<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Goomi - Minions & Monsters</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

<div class="outer">
    <div class="middle">
        <div class="main clearfix">
            <div class="postage">
                <div class="img">
                    <div class="art">
                        <div class="head"></div>
                        <div class="pants"></div>

                        <div class="eye left">
                            <span class="circle two"></span>
                        </div>

                        <div class="eye right">
                            <span class="circle two"></span>
                        </div>

                        <div class="mouth">
                            <span class="tooth left one"></span>
                            <span class="tooth left two"></span>
                            <span class="tooth right one"></span>
                            <span class="tooth right two"></span>
                        </div>

                        <div class="nose">
                            <span class="nose left"></span>
                            <span class="nose right"></span>
                            <span class="nose center"></span>
                            <span class="cheek left"></span>
                            <span class="cheek right"></span>
                        </div>

                    </div>

                    <div class="number">260705</div>
                    <div class="title">Goomi</div>
                </div>
            </div>
        </div>
    </div>
</div>

</html>
